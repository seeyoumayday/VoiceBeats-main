<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Beats</title>
    <script src="coi-serviceworker.js"></script>
    <link rel="icon" href="sample/logo-tab.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css"> <!-- CSSファイルのリンク -->
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.10.0/dist/ffmpeg.min.js"></script> <!-- ffmpeg.wasmのスクリプトを追加 -->
</head>
<body>
    <header>
        <img src="sample/logo.png" alt="Logo" class="logo"> <!-- ロゴ画像を追加 -->
        <h1>Voice Beats</h1> <!-- ヘッダタイトル -->
        <div id="bpm-display">♩=128</div> <!-- 現在のBPM表示 -->
        <div class="dropdown">
            <button class="dropbtn">1/8</button>
            <div class="dropdown-content">
                <a href="#" data-precision="1/8">1/8</a>
                <a href="#" data-precision="1/8T">1/8T</a>
                <a href="#" data-precision="1/16">1/16</a>
            </div>
        </div>
        <button id="export" class="export-button"></button> <!-- エクスポートボタン -->
    </header>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="howto.html">HOW TO</a></li>
            <li><a href="update.html">UPDATE</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>
    <main>
        <div class="visualize-container">
            <button id="play" class="has-tooltip" data-tooltip="再生"></button> <!-- 再生ボタン -->
            <canvas id="visualizer" class="visualizer"></canvas> <!-- オーディオビジュアライザのキャンバスを追加 -->
            <canvas id="spectrum" class="spectrum"></canvas> <!-- スペクトラムのキャンバスを追加 -->
        </div>
        <div id="sequencer">
            <div class="track-container">
                <div class="track kick">
                    <div class="control-wrapper pitch-wrapper has-tooltip" data-tooltip="ピッチ: x1.00">
                        <input type="range" class="pitch-bend-control" min="0" max="1" step="0.01" value="0.5"> <!-- キックピッチベンド調節バー -->
                    </div>
                    <div class="control-wrapper volume-wrapper has-tooltip" data-tooltip="音量: 50%">
                        <input type="range" class="volume-control" min="0" max="1" step="0.01" value="0.5"> <!-- キック音量調節バー -->
                    </div>
                    <button class="mute-button has-tooltip" data-tooltip="ミュート"></button> <!-- ミュートボタンを追加 -->
                    <button class="step"></button> <!-- キックステップボタン -->
                    <button class="step"></button>
                    <button class="step"></button>
                    <button class="step"></button>
                    <button class="step"></button>
                    <button class="step"></button>
                    <button class="step"></button>

                    <button class="step"></button>
                    <button class="step"></button>
                    <button class="step"></button>
                    <button class="step"></button>
                    <div class="control-wrapper has-tooltip" data-tooltip="録音">
                        <button class="record-button"></button> <!-- !ボタンを追加 -->
                    </div>
                    <div class="waveform-container">
                        <canvas class="waveform" id="kick-waveform"></canvas>
                        <div class="offset-handle"></div>
                        <div class="end-offset-handle"></div>
                        <div class="offset-overlay"></div>
                        <div class="end-offset-overlay"></div>
                    </div>
                    <input type="range" class="offset-control" min="0" max="1" step="0.01" value="0"> <!-- キックオフセット調節バー -->
                    <input type="range" class="end-offset-control" min="0" max="1" step="0.01" value="1"> <!-- キック終了位置調節バー -->
                </div>
                <div class="track snare">
                    <div class="control-wrapper pitch-wrapper has-tooltip" data-tooltip="ピッチ: x1.00">
                        <input type="range" class="pitch-bend-control" min="0" max="1" step="0.01" value="0.5"> <!-- スネアピッチベンド調節バー -->

                    <button class="mute-button has-tooltip" data-tooltip="ミュート"></button> <!-- ミュートボタンを追加 -->
                    <button class="step"></button> <!-- スネアステップボタン -->

                </div>

                    <div class="waveform-container">

                        <div class="offset-handle"></div>

                    <input type="range" class="end-offset-control" min="0" max="1" step="0.01" value="1"> <!-- クラップ終了位置調節バー -->

        <div id="volume-container">
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5"> <!-- 音量バーを追加 -->
        </div>
        <div id="bpm-container">
            <label for="bpm"></label> 
            <input type="range" id="bpm" min="60" max="200" step="1" value="128">

    <footer class = "index-footer">
        <p>&copy; 2024 Mayday</p> <!-- フッタ -->
