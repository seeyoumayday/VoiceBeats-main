<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="coi-serviceworker.js"></script>
    <title>About - Voice Beats</title>
    <link rel="icon" href="sample/logo-tab.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
</head>

<body class="about-body">
    <header>
        <img src="sample/logo.png" alt="Logo" class="logo"> <!-- ロゴ画像を追加 -->
        <h1>Voice Beats</h1> <!-- ヘッダタイトル -->
        <div id="bpm-display">♩=128</div> <!-- 現在のBPM表示 -->
        <div class="dropdown">
            <button class="dropbtn">1/8</button>
            <div class="dropdown-content">
                <a href="#" data-precision="1/8">1/8</a>
                <a href="#" data-precision="1/8T">1/8T</a>
                <a href="#" data-precision="1/16">1/16</a>
            </div>
        </div>
        <button id="export" class="export-button"></button> <!-- エクスポートボタン -->
    </header>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="howto.html">HOW TO</a></li>
            <li><a href="update.html">UPDATE</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>
    <main class="about-main">
        <div class="profile-container">
            <div class="profile-card">
                <!-- Music wave visualizer decoration in the background -->
                <div class="music-wave-bg">
                    <div class="music-bar" style="--i: 1"></div>
                    <div class="music-bar" style="--i: 2"></div>
                    <div class="music-bar" style="--i: 3"></div>
                    <div class="music-bar" style="--i: 4"></div>
                    <div class="music-bar" style="--i: 5"></div>
                    <div class="music-bar" style="--i: 6"></div>
                    <div class="music-bar" style="--i: 7"></div>
                    <div class="music-bar" style="--i: 8"></div>
                </div>

                <div class="profile-header">
                    <div class="profile-image-wrapper">
                        <img src="sample/icon.PNG" alt="五月一日" class="my-icon-new">
                    </div>
                    <h2 class="profile-name">五月一日 <span class="profile-handle">Mayday</span></h2>
                    <div class="profile-badges">
                        <span class="profile-badge">Music Producer</span>
                        <span class="profile-badge">Bassist</span>
                    </div>
                </div>

                <div class="profile-body">
                    <p class="profile-desc">
                        五月一日と申します。<br>
                        楽曲制作やベースの演奏を中心に活動しています。<br>
                    </p>
                </div>

                <div class="profile-actions">
                    <a href="https://seeyoumayday.github.io/Portfolio/" target="_blank" class="portfolio-cta">
                        <span>PORTFOLIO SITE</span>
                        <svg class="cta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer class="howto-footer">
        <p>&copy; 2024 Mayday</p> <!-- フッタ -->
    </footer>
</body>

</html>
