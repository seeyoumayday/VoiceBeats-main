<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="coi-serviceworker.js"></script>
    <title>Update - Voice Beats</title>
    <link rel="icon" href="sample/logo-tab.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
</head>

<body class="update-body">
    <header>
        <img src="sample/logo.png" alt="Logo" class="logo"> <!-- ロゴ画像を追加 -->
        <h1>Voice Beats</h1> <!-- ヘッダタイトル -->
        <div id="bpm-display">♩=128</div> <!-- 現在のBPM表示 -->
        <div class="dropdown">
            <button class="dropbtn">1/8</button>
            <div class="dropdown-content">
                <a href="#" data-precision="1/8">1/8</a>
                <a href="#" data-precision="1/8T">1/8T</a>
                <a href="#" data-precision="1/16">1/16</a>
            </div>
        </div>
        <button id="export" class="export-button"></button> <!-- エクスポートボタン -->
    </header>
    <nav>
        <button class="hamburger-menu" id="hamburger-btn" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="howto.html">HOW TO</a></li>
            <li><a href="update.html">UPDATE</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>
    <main class="update-main">
        <div class="update-container">
            <div class="update-card">
                <h2 class="update-card-title">アップデート情報</h2>

                <div class="timeline">
                    <!-- Timeline Item: v1.2.0 -->
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="timeline-header">
                                <span class="version-badge">v1.2.0</span>
                                <span class="version-date">2026年6月20日</span>
                            </div>
                            <ul class="update-details-list">
                                <li>スマートフォン版レイアウトに正式対応しました。</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Timeline Item: v1.1.0 -->
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="timeline-header">
                                <span class="version-badge">v1.1.0</span>
                                <span class="version-date">2026年6月20日</span>
                            </div>
                            <ul class="update-details-list">
                                <li>全体のUIを整えました。</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Timeline Item: v1.0.0 -->
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="timeline-header">
                                <span class="version-badge">v1.0.0</span>
                                <span class="version-date">2024年12月28日</span>
                            </div>
                            <ul class="update-details-list">
                                <li>基本的な機能を実装しました。</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="howto-footer">
        <p>&copy; 2024 Mayday</p> <!-- フッタ -->
    </footer>
    <script>
        document.getElementById('hamburger-btn').addEventListener('click', function () {
            document.querySelector('.nav-links').classList.toggle('active');
            this.classList.toggle('active');
        });
    </script>

</html>
